name: Bootstrap Governance

on:
  pull_request:
    paths:
      - '.github/workflows/bootstrap-governance.yml'
      - 'AGENTS.md'
      - 'docs/**'
      - 'package.json'
      - 'bun.lock'
      - 'scripts/check-docs.ps1'
      - 'src/**'
  push:
    branches:
      - main
    paths:
      - '.github/workflows/bootstrap-governance.yml'
      - 'AGENTS.md'
      - 'docs/**'
      - 'package.json'
      - 'bun.lock'
      - 'scripts/check-docs.ps1'
      - 'src/**'

jobs:
  governance:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Check docs
        run: bun run check:docs
