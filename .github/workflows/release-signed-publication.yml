name: Signed Release Publication

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version to restage
        required: true
        type: string
      release_candidate_run_id:
        description: Workflow run ID that produced the unsigned release candidate artifact
        required: true
        type: string
      signed_artifact_run_id:
        description: Workflow run ID that contains the signed exe artifact
        required: true
        type: string
      signed_artifact_name:
        description: Artifact name that contains the signed exe
        required: false
        default: ''
        type: string
      publish_github_release:
        description: Publish GitHub Release in the same workflow
        required: true
        default: true
        type: boolean
      promote_target:
        description: Optional promotion target after publish
        required: true
        default: none
        type: choice
        options:
          - none
          - draft
          - prerelease
          - stable

permissions:
  actions: read
  contents: write

jobs:
  signed-publication:
    runs-on: windows-latest
    env:
      NEKO_CODE_DISABLED_MCP_SERVERS: serena
      RELEASE_VERSION: ${{ inputs.version }}
      RELEASE_CANDIDATE_RUN_ID: ${{ inputs.release_candidate_run_id }}
      SIGNED_ARTIFACT_RUN_ID: ${{ inputs.signed_artifact_run_id }}
      SIGNED_ARTIFACT_NAME: ${{ inputs.signed_artifact_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Routing tests
        run: bun run test:routing

      - name: Release workflow parser tests
        run: bun run test:release-workflows

      - name: Text hygiene
        run: bun run check:text-hygiene

      - name: Download unsigned release candidate and signed exe
        id: materialize
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          $ErrorActionPreference = 'Stop'

          function Get-RunArtifacts {
            param(
              [string]$RunId
            )

            $headers = @{
              Authorization = "Bearer $env:GITHUB_TOKEN"
              Accept = 'application/vnd.github+json'
              'X-GitHub-Api-Version' = '2022-11-28'
            }

            $artifactsUrl = "https://api.github.com/repos/$env:GITHUB_REPOSITORY/actions/runs/$RunId/artifacts?per_page=100"
            $response = Invoke-RestMethod -Headers $headers -Uri $artifactsUrl
            return @($response.artifacts)
          }

          function Download-ArtifactZip {
            param(
              [string]$RunId,
              [string]$ArtifactName,
              [string]$ZipPath
            )

            $artifact = (Get-RunArtifacts -RunId $RunId) | Where-Object { $_.name -eq $ArtifactName } | Select-Object -First 1

            if (-not $artifact) {
              throw "Artifact '$ArtifactName' not found in workflow run $RunId"
            }

            $downloadHeaders = @{
              Authorization = "Bearer $env:GITHUB_TOKEN"
              Accept = 'application/octet-stream'
              'X-GitHub-Api-Version' = '2022-11-28'
            }

            Invoke-WebRequest -Headers $downloadHeaders -Uri $artifact.archive_download_url -OutFile $ZipPath
          }

          function Find-SignedExeInRun {
            param(
              [string]$RunId,
              [string]$ArtifactNameHint,
              [string]$ExtractRoot
            )

            $artifacts = Get-RunArtifacts -RunId $RunId
            if (-not $artifacts -or $artifacts.Count -eq 0) {
              throw "No artifacts found in workflow run $RunId"
            }

            $ordered = @()
            if (-not [string]::IsNullOrWhiteSpace($ArtifactNameHint)) {
              $ordered += @($artifacts | Where-Object { $_.name -eq $ArtifactNameHint })
              if ($ordered.Count -eq 0) {
                throw "Artifact '$ArtifactNameHint' not found in workflow run $RunId"
              }
            } else {
              $preferred = @(
                $artifacts | Where-Object { $_.name -match '(?i)signed|sign' }
              )
              $fallback = @(
                $artifacts | Where-Object { $_.name -notmatch '(?i)signed|sign' }
              )
              $ordered = @($preferred + $fallback)
            }

            foreach ($artifact in $ordered) {
              $zipPath = Join-Path $ExtractRoot ("signed-{0}.zip" -f $artifact.id)
              $extractPath = Join-Path $ExtractRoot ("signed-{0}" -f $artifact.id)
              if (Test-Path $extractPath) {
                Remove-Item -LiteralPath $extractPath -Recurse -Force
              }

              $downloadHeaders = @{
                Authorization = "Bearer $env:GITHUB_TOKEN"
                Accept = 'application/octet-stream'
                'X-GitHub-Api-Version' = '2022-11-28'
              }
              Invoke-WebRequest -Headers $downloadHeaders -Uri $artifact.archive_download_url -OutFile $zipPath
              Expand-Archive -LiteralPath $zipPath -DestinationPath $extractPath -Force

              $exes = @(Get-ChildItem -Path $extractPath -Recurse -File -Filter *.exe | Select-Object -ExpandProperty FullName)
              if (-not $exes -or $exes.Count -eq 0) {
                continue
              }

              # Prefer the direct binary (avoid setup/uninstall artifacts when present).
              $preferredExe = $exes | Where-Object { $_ -match '(?i)neko' -and $_ -notmatch '(?i)setup|installer|uninstall' } | Select-Object -First 1
              if ($preferredExe) {
                return $preferredExe
              }

              if ($exes.Count -eq 1) {
                return $exes[0]
              }

              $names = ($exes | ForEach-Object { Split-Path -Leaf $_ }) -join ', '
              throw "Multiple .exe files found in artifact '$($artifact.name)'. Pass signed_artifact_name to disambiguate. Found: $names"
            }

            $available = ($artifacts | ForEach-Object { $_.name }) -join ', '
            throw "Could not find a signed .exe in run $RunId. Available artifacts: $available"
          }

          $artifactRoot = Join-Path $PWD '.github-artifacts'
          $candidateExtract = Join-Path $artifactRoot 'candidate'
          $signedExtract = Join-Path $artifactRoot 'signed'
          New-Item -ItemType Directory -Force -Path $artifactRoot | Out-Null

          $candidateArtifactName = "neko-code-release-candidate-$env:RELEASE_VERSION-unsigned-win32-x64"
          $candidateZip = Join-Path $artifactRoot 'candidate.zip'
          Download-ArtifactZip -RunId $env:RELEASE_CANDIDATE_RUN_ID -ArtifactName $candidateArtifactName -ZipPath $candidateZip
          Expand-Archive -LiteralPath $candidateZip -DestinationPath $candidateExtract -Force

          $candidateTarget = Join-Path $PWD "dist/release-candidate/$env:RELEASE_VERSION"
          Remove-Item -LiteralPath $candidateTarget -Recurse -Force -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force -Path $candidateTarget | Out-Null
          Copy-Item -Path (Join-Path $candidateExtract '*') -Destination $candidateTarget -Recurse -Force

          $signedBinary = Find-SignedExeInRun -RunId $env:SIGNED_ARTIFACT_RUN_ID -ArtifactNameHint $env:SIGNED_ARTIFACT_NAME -ExtractRoot $signedExtract
          if (-not $signedBinary) {
            throw "Signed artifact run $env:SIGNED_ARTIFACT_RUN_ID does not contain a signed .exe"
          }

          "signed_binary=$signedBinary" >> $env:GITHUB_OUTPUT

      - name: Apply signed artifact
        shell: pwsh
        run: |
          bun run scripts/apply-signed-release-artifact.ts --version "$env:RELEASE_VERSION" --signed-binary "${{ steps.materialize.outputs.signed_binary }}"

      - name: Stage release deploy
        shell: pwsh
        run: |
          bun run scripts/stage-release-deploy.ts --skip-stage-publication

      - name: Stage native installer baseline
        shell: pwsh
        run: |
          bun run scripts/stage-native-installer.ts --skip-stage-publication

      - name: Smoke signed publication
        shell: pwsh
        run: |
          bun run scripts/native-installer-release-publication-smoke.ts --skip-stage-publication

      - name: Smoke native installer baseline
        shell: pwsh
        run: |
          bun run scripts/stage-native-installer-smoke.ts --skip-stage-native-installer

      - name: Smoke signed deploy publish
        shell: pwsh
        run: |
          bun run scripts/release-deploy-publish-smoke.ts --skip-stage-deploy

      - name: Smoke signed native update
        shell: pwsh
        run: |
          bun run scripts/native-update-cli-release-deploy-smoke.ts --skip-stage-deploy

      - name: Stage GitHub release assets
        if: ${{ inputs.publish_github_release }}
        shell: pwsh
        run: |
          bun run scripts/stage-github-release.ts --skip-stage-deploy

      - name: Smoke GitHub release package
        if: ${{ inputs.publish_github_release }}
        shell: pwsh
        run: |
          bun run scripts/stage-github-release-smoke.ts --skip-signed-workflow --skip-stage-github-release

      - name: Publish draft prerelease
        if: ${{ inputs.publish_github_release }}
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          bun run scripts/publish-github-release-smoke.ts --skip-stage-github-release
          bun run scripts/publish-github-release.ts --version "$env:RELEASE_VERSION"

      - name: Promote GitHub release
        if: ${{ inputs.publish_github_release && inputs.promote_target != 'none' }}
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TARGET: ${{ inputs.promote_target }}
        run: |
          bun run scripts/promote-github-release-smoke.ts
          bun run scripts/promote-github-release.ts --version "$env:RELEASE_VERSION" --target "$env:RELEASE_TARGET"

      - name: Upload signed release candidate
        uses: actions/upload-artifact@v4
        with:
          name: neko-code-release-candidate-${{ inputs.version }}-signed-win32-x64
          path: dist/release-candidate/${{ inputs.version }}
          if-no-files-found: error
          retention-days: 14

      - name: Upload release publication
        uses: actions/upload-artifact@v4
        with:
          name: neko-code-release-publication-${{ inputs.version }}-signed-win32-x64
          path: dist/release-publication/${{ inputs.version }}
          if-no-files-found: error
          retention-days: 14

      - name: Upload native installer baseline
        uses: actions/upload-artifact@v4
        with:
          name: neko-code-native-installer-${{ inputs.version }}-signed-win32-x64
          path: dist/native-installer/${{ inputs.version }}
          if-no-files-found: error
          retention-days: 14

      - name: Upload release deploy
        uses: actions/upload-artifact@v4
        with:
          name: neko-code-release-deploy-${{ inputs.version }}-signed-win32-x64
          path: dist/release-deploy/${{ inputs.version }}
          if-no-files-found: error
          retention-days: 14

      - name: Upload staged GitHub release package
        if: ${{ inputs.publish_github_release }}
        uses: actions/upload-artifact@v4
        with:
          name: neko-code-github-release-${{ inputs.version }}-win32-x64
          path: dist/github-release/${{ inputs.version }}
          if-no-files-found: error
          retention-days: 14

      - name: Write release summary
        shell: pwsh
        run: |
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "## Signed Publication"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value ""
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Version: $env:RELEASE_VERSION"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Publish GitHub Release: ${{ inputs.publish_github_release }}"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Promote target: ${{ inputs.promote_target }}"
